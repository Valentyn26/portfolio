<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/iconfonts.min.css">
    <link rel="stylesheet" href="css/style.min.css">
    <title>Головна</title>
</head>

<body>
    <header class="header">
    <div class="header__settings settings">
        <div class="settings__container">
            <div class="settings__location _icon-map-pin">Store Location: Lincoln- 344, Illinois, Chicago, USA</div>
            <div class="settings__box">
                <div class="settings__language _icon-arrow">Eng</div>
                <div class="settings__currency _icon-arrow">USD</div>
                <div class="settings__line"></div>
                <div class="settings__reg">Sign In / Sign Up</div>
            </div>
        </div>
    </div>
    <div class="header__search-navigation search-navigation">
        <div class="search-navigation__container">
            <div class="search-navigation__logo logo">
                <img src="img/icons/plant.svg" class="logo__icon"></img>
                <div class="logo__name">Ecobazar</div>
            </div>
            <div class="search-navigation__search-box search-box">
                <div class="search-box__input _icon-magnifying-glass">
                    <input type="text" placeholder="Search">
                </div>
                <button class="search-box__button">Search</button>
            </div>
            <div class="search-navigation__shopping-box shopping-box">
                <div class="shopping-box__item shopping-item">
                    <div class="shopping-item__icon _icon-heart"></div>
                </div>
                <div class="shopping-box__line"></div>
                <div class="shopping-box__item shopping-item">
                    <div class="shopping-item__icon _icon-cart"></div>
                    <div class="shopping-item__info">
                        <div class="shopping-item__text">Shopping cart:</div>
                        <div class="shopping-item__price">$57.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="header__menu menu">
        <div class="menu__container">
            <nav class="menu__navigation">
                <ul class="menu__list">
                    <li class="menu__item _icon-arrow"><a href="" class="menu__link">Home</a></li>
                    <li class="menu__item"><a href="" class="menu__link">Shop</a></li>
                    <li class="menu__item"><a href="" class="menu__link">Pages</a></li>
                    <li class="menu__item"><a href="" class="menu__link">Blog</a></li>
                    <li class="menu__item"><a href="" class="menu__link">About Us</a></li>
                    <li class="menu__item"><a href="" class="menu__link">Contact Us</a></li>
                </ul>
            </nav>
            <a href="tel:2195550114" class="menu__phone phone">
                <div class="phone__icon _icon-phone"></div>
                <div class="phone__number">(219) 555-0114</div>
            </a>
        </div>
    </div>
</header>
    <main></main>
    <footer></footer>
</body>

</html>
